openapi: "3.0.1"
info:
  title: Bookstore API
  description: A sample OAS 3.0.1 API for testing api-console parsing
  version: "1.0.0"
  contact:
    name: API Console Team
    email: arc@mulesoft.com

servers:
  - url: https://api.bookstore.example.com/v1
    description: Production
  - url: https://staging-api.bookstore.example.com/v1
    description: Staging

paths:
  /books:
    get:
      operationId: listBooks
      summary: List all books
      description: Returns a paginated list of books
      tags:
        - Books
      parameters:
        - name: page
          in: query
          description: Page number
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          description: Items per page
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: genre
          in: query
          description: Filter by genre
          required: false
          schema:
            type: string
            enum:
              - fiction
              - non-fiction
              - science
              - history
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Book"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createBook
      summary: Create a new book
      tags:
        - Books
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookInput"
      responses:
        "201":
          description: Book created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "422":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /books/{bookId}:
    parameters:
      - name: bookId
        in: path
        required: true
        description: The book ID
        schema:
          type: string
          format: uuid
    get:
      operationId: getBook
      summary: Get a book by ID
      tags:
        - Books
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "404":
          description: Book not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      operationId: updateBook
      summary: Update a book
      tags:
        - Books
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookInput"
      responses:
        "200":
          description: Book updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
    delete:
      operationId: deleteBook
      summary: Delete a book
      tags:
        - Books
      responses:
        "204":
          description: Book deleted
        "404":
          description: Book not found

  /books/{bookId}/reviews:
    parameters:
      - name: bookId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: listReviews
      summary: List reviews for a book
      tags:
        - Reviews
      responses:
        "200":
          description: List of reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      operationId: createReview
      summary: Add a review
      tags:
        - Reviews
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "401":
          description: Unauthorized

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Book:
      type: object
      required:
        - id
        - title
        - author
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          example: "The Great Gatsby"
        author:
          type: string
          example: "F. Scott Fitzgerald"
        isbn:
          type: string
          pattern: "^\\d{13}$"
          example: "9780743273565"
        genre:
          type: string
          enum:
            - fiction
            - non-fiction
            - science
            - history
        publishedDate:
          type: string
          format: date
        price:
          type: number
          format: float
          minimum: 0
        inStock:
          type: boolean
          default: true

    BookInput:
      type: object
      required:
        - title
        - author
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        author:
          type: string
          minLength: 1
        isbn:
          type: string
          pattern: "^\\d{13}$"
        genre:
          type: string
          enum:
            - fiction
            - non-fiction
            - science
            - history
        publishedDate:
          type: string
          format: date
        price:
          type: number
          format: float
          minimum: 0

    Review:
      type: object
      properties:
        id:
          type: string
          format: uuid
        bookId:
          type: string
          format: uuid
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
        createdAt:
          type: string
          format: date-time

    ReviewInput:
      type: object
      required:
        - rating
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          maxLength: 1000

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: string
