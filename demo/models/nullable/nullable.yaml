      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            status: 403
            path: '/v1/00DRM00000067To/chatbots/HelloWorldBot/messages'
            requestId: '19c056ab-d909-49df-b976-65e56b6ab214'
            error: 'ForbiddenError'
            message: 'User forbidden from accessing the resource'
